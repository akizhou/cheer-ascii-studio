<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cheer Studio — pick images</title>
    <style>
      :root {
        --bg: #14151a;
        --panel: #1e2027;
        --line: #2c2f3a;
        --fg: #e6e6ec;
        --mut: #9aa0ad;
        --acc: #5b8cff;
        --sel: #3ddc84;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font:
          14px system-ui,
          sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        padding: 10px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }
      label {
        color: var(--mut);
        font-size: 12px;
      }
      select,
      input,
      button {
        font: inherit;
        color: var(--fg);
        background: #262833;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
      }
      button {
        cursor: pointer;
      }
      button.primary {
        background: var(--acc);
        border-color: var(--acc);
      }
      button.warn {
        background: #3a2730;
        border-color: #5a3340;
      }
      #statusEl {
        color: var(--mut);
        margin-left: auto;
      }
      .hint {
        color: var(--mut);
        font-size: 12px;
        padding: 8px 16px 0;
      }
      main {
        padding: 14px 16px;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
      }
      .t {
        position: relative;
        aspect-ratio: 3/4;
        border: 3px solid transparent;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        background: #0c0d11;
      }
      .t img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .t.sel {
        border-color: var(--sel);
      }
      .t.sel::after {
        content: "✓";
        position: absolute;
        top: 4px;
        right: 7px;
        color: var(--sel);
        font-weight: 700;
        text-shadow: 0 0 4px #000;
      }
    </style>
  </head>
  <body>
    <header>
      <label>subject</label>
      <select id="subject"></select>
      <input id="custom" placeholder="custom key (optional)" />
      <button id="refresh">Refresh</button>
      <button id="all">Select all</button>
      <button id="clearSel">Clear selection</button>
      <button id="clearCap" class="warn">Clear captured</button>
      <button id="send" class="primary" disabled>Send 0 selected →</button>
      <span id="statusEl"></span>
    </header>
    <p class="hint">
      Shows what was just scanned. On a single Instagram post: that post's full carousel. On a profile/feed: it scrolls
      to the bottom and opens every post (up to 40) to grab all carousels — slow, keep that tab focused. Pick, then
      Send.
    </p>
    <main><div id="grid"></div></main>
    <script src="picker.js"></script>
  </body>
</html>
